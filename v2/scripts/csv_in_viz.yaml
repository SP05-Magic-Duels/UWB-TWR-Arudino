settings:
  use_mock_data: true       # Set to false to read from the ESP32
  serial_port: "COM31"       # Windows: "COM3", Mac/Linux: "/dev/ttyUSB0"
  baud_rate: 115200
  plot_dimensions: 3        # 2 for 2D top-down, 3 for interactive 3D

# --- KALMAN FILTER SETTINGS ---
  use_kalman_filter: true
  dt: 0.05                # Expected time between updates in seconds (0.05 = 20Hz)
  process_noise: 0.1      # Higher = trusts measurements more (jittery). Lower = trusts physics more (smooth but lags).
  measurement_noise: 0.5  # Estimated variance of your UWB sensors in meters.


# Define your anchors. The order here dictates the CSV order!
# CSV line: "Range_A0, Range_A1, Range_A2, Range_A3"
anchors:
  "A1": [0.7112, 1.3716, 0.6858]
  "A2": [0.0, 1.3716,  0.6858]
  "A3": [0.7112, 0.00, 0.6858]
  "A4": [0.00, 0.00, 0.6858]
  "A5": [0.6858, 1.3716, 0]
  "A6": [0.0254, 1.3716, 0]
  "A7": [0.6858, 0.00, 0]
  "A8": [0.00, 0.00, 0.00]